<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nontonix Links - Hubungkan Ke Hiburan Favoritmu</title>
    
    <!-- Favicon -->
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050a12;
            --primary: #FF5545;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 85, 69, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 227, 253, 0.1) 0%, transparent 40%);
        }

        .wrapper {
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        /* --- Profile --- */
        .profile {
            margin-bottom: 32px;
        }

        .logo-container {
            width: 96px;
            height: 96px;
            background: var(--surface);
            border: 2px solid var(--primary);
            border-radius: 30px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 85, 69, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .logo-svg {
            width: 60px;
            height: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .bio {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 300px;
            margin: 0 auto;
            line-height: 1.4;
        }

        /* --- Links --- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .link-item:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .link-item:hover::before {
            left: 100%;
        }

        .link-item.featured {
            background: var(--primary);
            color: #fff;
            border: none;
            box-shadow: 0 8px 20px rgba(255, 85, 69, 0.3);
        }

        .link-item.featured:hover {
            filter: brightness(1.1);
            box-shadow: 0 12px 25px rgba(255, 85, 69, 0.5);
        }

        /* --- Socials --- */
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .social-icon {
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .social-icon:hover {
            color: var(--primary);
        }

        /* --- Footer --- */
        footer {
            margin-top: 60px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

</body>
